version: '3.9'

services:
  neurolock:
    build: .
    container_name: neurolock-ai-v2
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # Persist data between restarts
      - ./data:/app/data
      - ./exports:/app/exports
      - ./checkpoints:/app/checkpoints
      - ./archive:/app/archive       # FER dataset (for training)
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    # GPU support (uncomment for NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # Optional: train inside Docker
  train:
    build: .
    container_name: neurolock-train
    profiles: ["train"]
    volumes:
      - ./archive:/app/archive
      - ./exports:/app/exports
      - ./checkpoints:/app/checkpoints
    command: ["python", "train.py", "--dataset", "archive", "--model", "both"]
